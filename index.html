<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arie Translator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main>
    <h1>Arie Translator</h1>
    <textarea id="input-text" placeholder="Enter text in English or Hebrew…" rows="8"></textarea>
    <div class="controls">
      <button id="translate-btn">Translate</button>
      <span id="error-msg" hidden></span>
    </div>
    <textarea id="output-text" placeholder="Translation will appear here…" rows="8" readonly></textarea>
  </main>
  <footer>
    <span id="last-modified"></span>
    <button id="history-btn" title="Translation history">*</button>
  </footer>

  <section id="history-section" hidden>
    <h2>History</h2>
    <div id="history-table-wrap">
      <table id="history-table">
        <thead>
          <tr><th>#</th><th>Source</th><th>Translation</th><th>Date</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <script>
    const btn = document.getElementById('translate-btn');
    const inputEl = document.getElementById('input-text');
    const outputEl = document.getElementById('output-text');
    const errorEl = document.getElementById('error-msg');

    fetch('/api/last-modified')
      .then(r => r.json())
      .then(data => {
        document.getElementById('last-modified').textContent = 'Last updated: ' + data.last_modified;
      });

    btn.addEventListener('click', async () => {
      const text = inputEl.value.trim();
      if (!text) return;

      btn.disabled = true;
      btn.textContent = 'Translating…';
      errorEl.hidden = true;
      outputEl.value = '';

      try {
        const res = await fetch('/api/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        const data = await res.json();

        if (data.translation) {
          outputEl.value = data.translation;
        } else {
          errorEl.textContent = data.error || 'אירעה שגיאה לא צפויה.';
          errorEl.hidden = false;
        }
      } catch {
        errorEl.textContent = 'אירעה שגיאת רשת. אנא בדוק את החיבור.';
        errorEl.hidden = false;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Translate';
      }
    });
    const historyBtn = document.getElementById('history-btn');
    const historySection = document.getElementById('history-section');
    const historyTbody = document.querySelector('#history-table tbody');

    historyBtn.addEventListener('click', async () => {
      if (!historySection.hidden) {
        historySection.hidden = true;
        return;
      }
      historyTbody.innerHTML = '<tr><td colspan="4">טוען…</td></tr>';
      historySection.hidden = false;
      try {
        const res = await fetch('/api/history');
        const data = await res.json();
        if (data.error) {
          historyTbody.innerHTML = `<tr><td colspan="4">${data.error}</td></tr>`;
          return;
        }
        if (data.length === 0) {
          historyTbody.innerHTML = '<tr><td colspan="4">אין רשומות עדיין.</td></tr>';
          return;
        }
        historyTbody.innerHTML = data.map((r, i) => `
          <tr>
            <td>${i + 1}</td>
            <td>${escapeHtml(r.source_text)}</td>
            <td>${escapeHtml(r.translation)}</td>
            <td>${r.created_at}</td>
          </tr>`).join('');
      } catch {
        historyTbody.innerHTML = '<tr><td colspan="4">שגיאת רשת.</td></tr>';
      }
    });

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
